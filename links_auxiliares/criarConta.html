<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMusic/Login/Criar conta</title><link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet">
</head>

<body class="createAcountBody">

    <header class="loginHeader">

        <span class="logo">PlayMusic</span>

        <a href="./login.html" class="home">Login</a>

    </header>

    <main class="conteinerAcount">

        <form>

            <h1><strong>Criar conta</strong></h1>

            <div class="inputboxAcount">

                <input placeholder="Nome de Usuário" type="text">

                <i class="bx bxs-user"></i>

            </div>

            <div class="inputboxAcount">

                <input placeholder="Insira um E-mail" type="email">

                <i class="bx bxs-envelope"></i>

            </div>

            <div class="inputboxAcount">

                <input placeholder="Crie uma senha" type="password">

                <i class="bx bxs-lock-alt"></i>

            </div>

            <div class="inputboxAcount">

                <input placeholder="Data de nascimento" type="text">

                <i class="bx bxs-calendar"></i>

            </div>

            <div class="terms">

                <label>
                <input type="checkbox" required>
                Concorda com nossos termos de uso</label>

            </div>

           <div class="terms">

                <label>
                <input type="checkbox">
                Envio de dados opcionais</label>

            </div>

            <button type="reset" class="cleanAll">Limpar</button>
            <button type="submit" class="makeAcount">Criar conta</button>

        </form>

    </main>

    <footer>

        <nav>

            <ul  class="footerLinks">

                <li><a href="#">Contato SAC</a></li>
                <li><a href="#">Envie sugestões</a></li>
                <li><a href="#">&copy; 2026 all rights reserved</a></li>
                <li><a href="#"><i class="bx bxl-instagram"></i></a> <a href="#"><i class="bx bxl-whatsapp"></i></a> <a href="#"><i class="bx bxl-facebook"></i></a></li>
            
            </ul>

        </nav>

    </footer>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper></div>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    
</body>

</html>
