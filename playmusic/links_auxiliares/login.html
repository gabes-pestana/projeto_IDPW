<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Document</title>
</head>

<body class="loginPage">

    <header class="loginHeader">

        <span class="logo">PlayMusic</span>

        <a href="../index.html" class="home">Home</a>

    </header>
    
    <main class="containerLogin">

        <form>

            <h1>Login</h1>

            <div class="inputboxLogin">

                <input placeholder="Usuário" type="email">

                <i class="bx bxs-user"></i>

            </div>

            <div class="inputboxLogin">

                <input placeholder="Senha" type="password">

                <i class="bx bxs-lock-alt"></i>

            </div>

            <div class="remember-forgot">

                <label>

                <input type="checkbox">
                    Lembrar senha
                </label>

                <a href="./esqueciSenha.html">Esqueci senha</a>

            </div>

            <button type="submit" class="login">Login</button>

            <div class="registerLink">

                <p>Não possui uma conta? <a href="./criarConta.html">Cadastre-se</a></p>

            </div>

        </form>

    </main>

    <footer class="otherFooters">

        <nav>

            <ul  class="otherFooterLinks">

                <li><a href="#">Contato SAC</a></li>
                <li><a href="#">Envie sugestões</a></li>
                <li><a href="#">&copy; 2026 all rights reserved</a></li>
            
            </ul>

        </nav>

    </footer>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

</body>
</html>
